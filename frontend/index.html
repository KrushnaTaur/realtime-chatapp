<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatApp — Real-Time Messenger</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="app-layout">

    <!-- ─────────────────────────────────
         SIDEBAR: User list
    ───────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-header">

        <!-- App branding -->
        <div class="sidebar-logo">
          <div class="logo-icon">💬</div>
          <span>ChatApp</span>
        </div>

        <!-- Logged-in user info + logout -->
        <div class="current-user-bar">
          <div>
            <div class="you-label">Logged in as</div>
            <div id="currentUserName">...</div>
          </div>
          <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>

        <!-- Search users -->
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search users..." />
        </div>
      </div>

      <div class="sidebar-section-title">People</div>

      <!-- Populated by chat.js -->
      <ul id="userList"></ul>
    </aside>

    <!-- ─────────────────────────────────
         MAIN CHAT AREA
    ───────────────────────────────── -->
    <main class="chat-main">

      <!-- Shown when no chat is selected -->
      <div id="noChatSelected">
        <div class="placeholder-icon">💬</div>
        <h3>Your Messages</h3>
        <p>Select a person from the sidebar to start chatting</p>
      </div>

      <!-- Chat window (hidden until a user is selected) -->
      <div id="chatArea">

        <!-- Header: shows selected user name + status -->
        <div id="chatHeader"></div>

        <!-- Scrollable message list -->
        <div id="messages"></div>

        <!-- Typing indicator -->
        <div id="typingIndicator">
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
          <span id="typingText">is typing...</span>
        </div>

        <!-- Message input -->
        <div class="input-area">
          <input
            type="text"
            id="messageInput"
            placeholder="Type a message..."
            autocomplete="off"
            maxlength="2000"
          />
          <button id="sendBtn" title="Send message">
            ➤
          </button>
        </div>

      </div>
    </main>
  </div>

  <!-- Socket.io client (loaded from backend) -->
  <script src="https://realtime-chatapp-w7bf.onrender.com/socket.io/socket.io.js"></script>
  <script src="js/config.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
