<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — ChatApp</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon">💬</div>
      <h1>ChatApp</h1>
    </div>

    <h2>Create an account</h2>
    <p class="subtitle">Join and start chatting in real-time</p>

    <form id="signupForm" novalidate>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="John Doe" autocomplete="name" required />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password" required />
      </div>

      <button class="btn-primary" id="submitBtn" type="submit">Create Account</button>

      <div class="error-message" id="error"></div>
    </form>

    <div class="auth-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
