<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ChatApp</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon">💬</div>
      <h1>ChatApp</h1>
    </div>

    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to continue to your conversations</p>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" autocomplete="current-password" required />
      </div>

      <button class="btn-primary" id="submitBtn" type="submit">Sign In</button>

      <div class="error-message" id="error"></div>
    </form>

    <div class="auth-link">
      Don't have an account? <a href="signup.html">Create one</a>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
